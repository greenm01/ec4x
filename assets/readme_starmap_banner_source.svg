  <defs>
    <style>
      /* Lane styles */
      .lane { stroke-linecap: round; }
      .lane-major { stroke: #B8860B; stroke-width: 3; }
      .lane-minor { stroke: #4682B4; stroke-width: 2; 
                    stroke-dasharray: 8,4; }
      .lane-restricted { stroke: #8B0000; stroke-width: 1.5; 
                         stroke-dasharray: 3,3; }
      
      /* Node styles */
      .node-hub { fill: #B8860B; stroke: #FFFFFF; stroke-width: 2; }
      .node-own { stroke: none; }
      .node-enemy { fill: transparent; stroke-width: 2; }
      .node-neutral { fill: #333333; stroke: #FFFFFF; 
                       stroke-width: 1; }
      
      /* Label styles */
      .label { fill: #FFFFFF; font-family: monospace; 
               text-anchor: middle; }
      .label-name { font-size: 11px; font-weight: bold; }
      .label-coord { fill: #AAAAAA; font-size: 9px; }
      .label-info { fill: #888888; font-size: 8px; }
      .label-inside { fill: #FFFFFF; font-family: monospace;
                      font-size: 9px; font-weight: bold;
                      text-anchor: middle; dominant-baseline: central; }
      
      /* Legend styles */
      .legend-text { fill: #FFFFFF; font-family: monospace; 
                     font-size: 10px; }
      .legend-title { fill: #FFFFFF; font-family: monospace; 
                      font-size: 12px; font-weight: bold; }
    </style>
  </defs>
  
